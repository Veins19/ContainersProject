apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-worker
spec:
  selector:
    app: ai-worker
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
